version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: medical_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: medical_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: medical_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/medical_db
      - SECRET_KEY=a_very_secret_key_123_change_me_in_production
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - PROJECT_NAME=The Medical Avenue API
    volumes:
      - ./backend:/app
    depends_on:
      - db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
